name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: project-f14a10ae-fe33-409e-912
  REGION: europe-west1
  SERVICE: cwi-app
  IMAGE: europe-west1-docker.pkg.dev/project-f14a10ae-fe33-409e-912/cwi-repo/cwi
  GCS_BUCKET: cwi-recipes-data

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --set-env-vars GCS_BUCKET=$GCS_BUCKET \
            --set-secrets MISTRAL_API_KEY=MISTRAL_API_KEY:latest,API_KEY=API_KEY:latest \
            --allow-unauthenticated \
            --quiet
